<!DOCTYPE html>
<html lang="en">

    <head>
        <title>MaxwellJChen</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <script src = "test.js"></script>

        <style>
            /* Contains all buttons on homepage */
            .all-box {
                display: flex;

                margin: 40px;

                flex-direction: column;
                align-items: center;

                gap: 10px;
            }

            /* To contain MaxwellJChen */
            .title-box {
                width: 500px;
                height: 50px;
                
                margin: 0 auto;

                font-family: 'Manrope', sans-serif;
                font-weight: 300;
                font-size: 40px;
                text-align: center;
            }

            /* Invisible wrapper around button */
            .button {
                border: none;
                padding: 0px 0px;
            }

            .button:hover {
                opacity: 70%;
            }

            /* Darker outer rim to content buttons */
            .content-box {
                display: flex;
                width: 500px;
                height: 50px;

                background: url('https://wallpapers.com/images/featured/pastel-gradient-background-etu0z7lbeebg6mlf.jpg');
                filter: brightness(100%);
                background-size: cover;
                
                /* Align inner box in the center of the outer one */
                align-items: center;
            }

            /* Inner button to contain text */
            .inner-box {
                display: flex;
                width: 490px;
                height: 40px;
                justify-content: center;
                align-items: center;

                margin: 0 auto;

                /* Same picture with lighter color */
                background: url('https://wallpapers.com/images/featured/pastel-gradient-background-etu0z7lbeebg6mlf.jpg');
                filter: brightness(110%);
                background-size: cover;

                font-family: 'Manrope', sans-serif;
                font-weight: 200;
                font-size: 20px;
            }

        </style>
    </head>

    <body>

        <div class="all-box">

            <div class="title-box">
                MaxwellJChen
            </div>

            <button class="button" id="button1">
                <div class="content-box" style="background-position-y:30%;">
                    <div class="inner-box" style="background-position-y:30%;">
                        Personal Description
                    </div>
                </div>
            </button>

            <script type="text/javascript">
                document.getElementById("button1").onclick = function () {
                    window.open("https://drive.google.com/file/d/1F_plMCjOu8YAyvVAL5ZqvztQNOCiWuh_/view?usp=sharing", "_blank", "noopener");
                };
            </script>

            <button class="button" id="button2">
                <div class="content-box" style="background-position-y:45%;">
                    <div class="inner-box" style="background-position-y:45%;">
                        AI & Innovation
                    </div>
                </div>
            </button>

            <button class="button" id="button3">
                <div class="content-box" style="background-position-y:70%;">
                    <div class="inner-box" style="background-position-y:70%;">
                        Education
                    </div>
                </div>
            </button>

            <script type="text/javascript">
                document.getElementById("button3").onclick = function () {
                    window.open("https://www.vanderbilt.edu/", "_blank", "noopener");
                };
            </script>

        </div>

    </body>
